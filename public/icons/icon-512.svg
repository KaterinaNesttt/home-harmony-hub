<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: deep luxury dark -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <!-- Gold gradient for house -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD060"/>
      <stop offset="50%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#A07010"/>
    </linearGradient>
    <!-- Gold light gradient for roof highlight -->
    <linearGradient id="roofHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE088"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </linearGradient>
    <!-- Wall gradient -->
    <linearGradient id="wall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C060"/>
      <stop offset="100%" stop-color="#B08820"/>
    </linearGradient>
    <!-- Orb glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4A017" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4A017" stop-opacity="0"/>
    </radialGradient>
    <!-- Glass reflection -->
    <linearGradient id="glassSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#D4A017" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-filter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer rounded square bg -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>

  <!-- Glass sheen overlay on bg -->
  <rect width="512" height="512" rx="110" fill="url(#glassSheen)"/>

  <!-- Subtle border ring -->
  <rect x="4" y="4" width="504" height="504" rx="108" fill="none" stroke="#D4A017" stroke-width="2" stroke-opacity="0.3"/>

  <!-- ── 3D House illustration ── -->
  <g filter="url(#shadow)">

    <!-- House shadow on ground -->
    <ellipse cx="256" cy="380" rx="110" ry="18" fill="#000" fill-opacity="0.35"/>

    <!-- Main body / wall — front face -->
    <rect x="148" y="248" width="216" height="138" rx="6" fill="url(#wall)"/>

    <!-- Wall right side (3D depth) -->
    <polygon points="364,248 400,218 400,338 364,368" fill="#9A7418"/>

    <!-- Roof front face -->
    <polygon points="130,252 256,142 382,252" fill="url(#roofHighlight)"/>

    <!-- Roof right side (3D depth) -->
    <polygon points="382,252 418,222 294,112 256,142" fill="#A07010"/>

    <!-- Roof ridge highlight line -->
    <line x1="256" y1="142" x2="294" y2="112" stroke="#FFE09A" stroke-width="3" stroke-opacity="0.7"/>

    <!-- Chimney -->
    <rect x="316" y="148" width="28" height="52" rx="4" fill="#8A6410"/>
    <rect x="313" y="144" width="34" height="10" rx="3" fill="#9A7418"/>
    <!-- Chimney smoke puffs -->
    <circle cx="330" cy="130" r="10" fill="white" fill-opacity="0.15"/>
    <circle cx="324" cy="116" r="7" fill="white" fill-opacity="0.1"/>
    <circle cx="336" cy="108" r="5" fill="white" fill-opacity="0.08"/>

    <!-- Door -->
    <rect x="218" y="306" width="76" height="80" rx="8" fill="#1a1f2e"/>
    <rect x="220" y="308" width="72" height="76" rx="7" fill="#141820"/>
    <!-- Door arch -->
    <path d="M218,320 Q218,305 256,305 Q294,305 294,320" fill="#1a1f2e"/>
    <!-- Door window grid -->
    <line x1="256" y1="310" x2="256" y2="385" stroke="#D4A017" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="220" y1="347" x2="292" y2="347" stroke="#D4A017" stroke-width="1.5" stroke-opacity="0.4"/>
    <!-- Door knob -->
    <circle cx="238" cy="350" r="5" fill="#D4A017"/>
    <circle cx="238" cy="350" r="3" fill="#FFD060"/>

    <!-- Left window -->
    <rect x="162" y="268" width="62" height="52" rx="6" fill="#1a2a3a"/>
    <rect x="164" y="270" width="58" height="48" rx="5" fill="#162030"/>
    <line x1="193" y1="270" x2="193" y2="318" stroke="#D4A017" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="164" y1="294" x2="222" y2="294" stroke="#D4A017" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Window reflection -->
    <path d="M166,272 L180,272 L172,280 Z" fill="white" fill-opacity="0.15"/>

    <!-- Right window -->
    <rect x="290" y="268" width="62" height="52" rx="6" fill="#1a2a3a"/>
    <rect x="292" y="270" width="58" height="48" rx="5" fill="#162030"/>
    <line x1="321" y1="270" x2="321" y2="318" stroke="#D4A017" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="292" y1="294" x2="350" y2="294" stroke="#D4A017" stroke-width="1.5" stroke-opacity="0.5"/>
    <path d="M294,272 L308,272 L300,280 Z" fill="white" fill-opacity="0.15"/>

    <!-- Path to door -->
    <rect x="232" y="386" width="48" height="12" rx="4" fill="#C09028" fill-opacity="0.5"/>

  </g>

  <!-- Gold sparkle dots -->
  <circle cx="90" cy="90" r="4" fill="#FFD060" fill-opacity="0.7"/>
  <circle cx="422" cy="78" r="3" fill="#FFD060" fill-opacity="0.5"/>
  <circle cx="430" cy="420" r="4" fill="#FFD060" fill-opacity="0.6"/>
  <circle cx="82" cy="410" r="3" fill="#FFD060" fill-opacity="0.4"/>

  <!-- Top-left glass sheen on app icon -->
  <path d="M110,40 Q256,30 440,100 Q460,60 420,40 Q300,10 110,40Z" fill="white" fill-opacity="0.05"/>
</svg>
